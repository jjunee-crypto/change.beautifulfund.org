<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>변화의시나리오 · 공익활동지원사업</title>
<style>
  :root{
    --orange:#F4A100; --orange-d:#C8810A; --ink:#1A1A1A; --gray:#7F7F7F;
    --line:#E6E3DD; --bg:#FFFFFF; --bg2:#FBF8F2; --chip:#FDEBCF;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Pretendard','Malgun Gothic','맑은 고딕',system-ui,sans-serif;
       color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px;}
  /* header */
  header.site{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.96);
    border-bottom:1px solid var(--line);backdrop-filter:blur(6px);}
  .bar{display:flex;align-items:center;gap:28px;height:64px;}
  .brand{display:flex;align-items:baseline;gap:8px;font-weight:800;font-size:19px;cursor:pointer;}
  .brand .dot{color:var(--orange);}
  .brand small{font-size:11px;color:var(--gray);font-weight:600;}
  nav.gnb{display:flex;gap:4px;margin-left:auto;}
  nav.gnb a{padding:8px 13px;border-radius:8px;font-weight:600;font-size:15px;color:#333;cursor:pointer;}
  nav.gnb a:hover{background:var(--bg2);}
  nav.gnb a.active{color:var(--orange-d);background:var(--chip);}
  .btn{display:inline-block;background:var(--orange);color:#fff;font-weight:700;
    padding:9px 16px;border-radius:9px;cursor:pointer;border:none;font-size:15px;}
  .btn:hover{background:var(--orange-d);}
  .btn.ghost{background:#fff;color:var(--orange-d);border:1.5px solid var(--orange);}
  /* sections */
  main{min-height:60vh;}
  .page{display:none;padding:40px 0 64px;}
  .page.on{display:block;animation:f .3s ease;}
  @keyframes f{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  h1.ttl{font-size:30px;margin:0 0 6px;}
  .sub{color:var(--gray);margin:0 0 26px;}
  h2.sec{font-size:22px;margin:34px 0 14px;padding-bottom:8px;border-bottom:2px solid var(--orange);display:inline-block;}
  h3{font-size:18px;margin:20px 0 8px;}
  .tabs{display:flex;gap:6px;margin:0 0 24px;border-bottom:1px solid var(--line);}
  .tabs button{background:none;border:none;padding:11px 16px;font-size:16px;font-weight:600;color:#777;
    cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1px;}
  .tabs button.on{color:var(--orange-d);border-color:var(--orange);}
  .tabpane{display:none;} .tabpane.on{display:block;}
  /* hero */
  .hero{background:linear-gradient(180deg,var(--bg2),#fff);border:1px solid var(--line);
    border-radius:20px;padding:54px 44px;text-align:center;}
  .hero .kicker{color:var(--orange-d);font-weight:700;letter-spacing:.02em;margin-bottom:12px;}
  .hero h1{font-size:40px;line-height:1.25;margin:0 0 14px;}
  .hero p{font-size:17px;color:#555;max-width:600px;margin:0 auto 26px;}
  .hero .cta{display:flex;gap:10px;justify-content:center;}
  /* stats */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:26px 0;}
  .stat{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:22px;text-align:center;}
  .stat b{display:block;font-size:30px;color:var(--orange-d);}
  .stat span{color:var(--gray);font-size:14px;}
  /* cards */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
  .grid.two{grid-template-columns:repeat(2,1fr);}
  .card{border:1px solid var(--line);border-radius:14px;padding:20px;background:#fff;
    cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:8px;}
  .card:hover{border-color:var(--orange);box-shadow:0 6px 20px rgba(244,161,0,.10);transform:translateY(-2px);}
  .card .tag{align-self:flex-start;background:var(--chip);color:var(--orange-d);font-size:12px;
    font-weight:700;padding:3px 9px;border-radius:20px;}
  .card h4{margin:2px 0 0;font-size:17px;}
  .card p{margin:0;color:#666;font-size:14px;}
  .card .more{margin-top:auto;color:var(--orange-d);font-weight:700;font-size:14px;}
  .muted{color:var(--gray);font-size:14px;}
  /* filter */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 20px;}
  .filters button{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 14px;
    font-size:14px;cursor:pointer;font-weight:600;color:#555;}
  .filters button.on{background:var(--orange);color:#fff;border-color:var(--orange);}
  /* detail */
  .back{color:var(--orange-d);font-weight:700;cursor:pointer;display:inline-block;margin-bottom:14px;font-size:14px;}
  .detail-hero{background:var(--chip);border-radius:16px;padding:30px;margin-bottom:24px;}
  .detail-hero .tag{background:#fff;color:var(--orange-d);font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;}
  .detail-hero h1{margin:12px 0 6px;font-size:28px;}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:10px 16px;margin:14px 0;}
  .kv dt{font-weight:700;color:#444;}
  .kv dd{margin:0;color:#555;}
  .cta-band{background:var(--bg2);border:1px solid var(--line);border-radius:16px;
    padding:28px;text-align:center;margin-top:40px;}
  .cta-band h3{margin:0 0 6px;font-size:20px;}
  .cta-band p{margin:0 0 16px;color:#666;}
  .steps{counter-reset:s;display:grid;gap:12px;margin:16px 0;}
  .steps li{list-style:none;position:relative;padding:14px 16px 14px 54px;border:1px solid var(--line);border-radius:12px;background:#fff;}
  .steps li::before{counter-increment:s;content:counter(s);position:absolute;left:16px;top:14px;
    width:26px;height:26px;background:var(--orange);color:#fff;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;}
  table.tb{width:100%;border-collapse:collapse;margin:10px 0;font-size:14px;}
  table.tb th,table.tb td{border:1px solid var(--line);padding:10px 12px;text-align:left;}
  table.tb th{background:var(--bg2);}
  /* footer */
  footer.site{border-top:1px solid var(--line);background:var(--bg2);padding:34px 0;margin-top:20px;}
  footer.site .f{display:flex;flex-wrap:wrap;gap:16px 40px;align-items:center;justify-content:space-between;}
  footer.site .slogan{font-weight:800;font-size:16px;}
  footer.site .hash{color:var(--orange-d);font-size:13px;font-weight:600;}
  footer.site small{color:var(--gray);display:block;margin-top:8px;}
  .note{background:#FFF7E8;border:1px dashed var(--orange);border-radius:10px;padding:12px 16px;
    font-size:13px;color:#7a5a00;margin-bottom:26px;}
  @media(max-width:820px){
    .stats,.grid,.grid.two{grid-template-columns:1fr;}
    nav.gnb{display:none;}
    .hero h1{font-size:30px;}
  }
</style>
</head>

        <div class="card" style="cursor:default"><span class="tag">성과목표</span><h4>저변확대</h4><p><b>수행목표</b><br>다양한 공익의제와 활동주체를 발굴한다</p></div>
        <div class="card" style="cursor:default"><span class="tag">성과목표</span><h4>역량강화</h4><p><b>수행목표</b><br>지속가능한 공익활동을 위한 자원과 기반을 제공한다</p></div>
        <div class="card" style="cursor:default"><span class="tag">성과목표</span><h4>연결구축</h4><p><b>수행목표</b><br>공익활동과 시민을 연결한다</p></div>

      <h2 class="sec">성과목표를 반영한 사업유형</h2>
      <div class="grid two">
        <div class="card" style="cursor:default"><span class="tag">의제중심</span><h4>의제중심 지원사업</h4><p>변화를 위한 공익 의제를 발굴하고 문제를 해결할 수 있도록 지원한다.</p></div>

        <div class="card" style="cursor:default"><span class="tag">참여중심</span><h4>참여중심 지원사업</h4><p>누구나 공익활동에 쉽게 참여할 수 있도록 연결의 기회를 제공한다.</p></div>
      </div>

      <h2 class="sec">2026년 사업배치도</h2>
      <table class="tb"><thead><tr><th>사업유형</th><th>지원사업</th></tr></thead>
      <tbody>
        <tr><td>의제중심 지원사업</td><td>변화의시나리오 프로젝트지원사업 · 공익콘텐츠 제작지원사업</td></tr>

function pageSupport(){
  const types=[
    ['의제중심','변화를 위한 공익 의제를 발굴하고 문제를 해결할 수 있도록 지원합니다.'],
    ['주체중심','공익활동의 경험을 통해 새로운 주체가 성장할 수 있도록 지원합니다.'],
    ['토대중심','공익활동이 지속적으로 이루어질 수 있도록 자원과 문화를 지원합니다.'],
    ['참여중심','누구나 공익활동에 쉽게 참여할 수 있도록 연결의 기회를 제공합니다.'],
  ];
  const groups = types.map(([t,def])=>{
    const items = projects.filter(p=>p.type===t);
    const cards = t==='참여중심'
      ? `<div class="card" style="cursor:default;opacity:.75"><span class="tag">준비 중</span><h4>신규 지원사업</h4><p>2026년 신설 준비 중입니다.</p></div>`
      : items.map(projectCard).join('');
    return `<h3>${t} 지원사업</h3><p class="muted">${def}</p><div class="grid" style="margin-bottom:26px">${cards}</div>`;
  }).join('');
  return `<section class="page on">
    <h1 class="ttl">사업소개</h1>
    <p class="sub">2026년 공익활동지원사업을 사업유형별로 소개합니다</p>
    <div class="tabs" id="t-support">
      <button class="on" data-t="s1">사업안내</button>
      <button data-t="s2">사업현황</button>
    </div>
    <div class="tabpane on" data-tp="s1">
      <p>아름다운재단은 사업미션 아래 성과목표(저변확대·역량강화·연결구축)를 반영한 네 가지 사업유형으로 공익활동을 지원합니다. 각 사업을 눌러 목적과 지원대상을 확인하세요.</p>
      ${groups}
    </div>
    <div class="tabpane" data-tp="s2">
      <p>2026년 사업배치도 기준 사업유형별 현황입니다.</p>
      <div class="stats">
        <div class="stat"><b>4</b><span>사업유형</span></div>
        <div class="stat"><b>8</b><span>진행 중 지원사업</span></div>
        <div class="stat"><b>1</b><span>신규 준비 중</span></div>
      </div>
      <h3>사업유형별 지원사업</h3>
      <table class="tb"><thead><tr><th>사업유형</th><th>지원사업</th></tr></thead>
      <tbody>
        <tr><td>의제중심</td><td>변화의시나리오 프로젝트지원사업 · 공익콘텐츠 제작지원사업</td></tr>
        <tr><td>주체중심</td><td>공익단체 인큐베이팅지원사업 · 청소년 공익활동지원사업</td></tr>
        <tr><td>토대중심</td><td>공익단체 IT인프라지원사업 · 공익활동가 네트워크지원사업 · 지역시민사회 네트워크지원사업 · 청년활동가 안전망지원사업</td></tr>
        <tr><td>참여중심</td><td>(신규 준비 중)</td></tr>
      </tbody></table>
    </div>
  </section>`;
}

function pageProject(id){
  const p = projects.find(x=>x.id===id); if(!p) return pageSupport();
  const rel = (p.related||[]).map(rid=>archive.find(a=>a.id===rid)).filter(Boolean);
  return `<section class="page on">
    <span class="back" onclick="go('support')">← 사업소개로 돌아가기</span>
    <div class="detail-hero">
      <span class="tag">${p.type} 지원사업</span>
      <h1>${p.name}</h1>
      <p style="margin:0;color:#7a5a00;font-weight:600">${p.tagline}</p>
    </div>
    <h2 class="sec">사업목적</h2>
    <p>${p.purpose}</p>
    <dl class="kv">
      <dt>사업유형</dt><dd>${p.type} 지원사업</dd>
      <dt>지원대상</dt><dd>${p.target}</dd>
    </dl>
    <div class="note">세부 지원내용·규모·일정 등 상세 정보는 준비 중입니다. 공모 일정은 ‘공모·신청’ 메뉴에서 안내됩니다.</div>
    ${rel.length?`<h2 class="sec">관련 이야기</h2><div class="grid two">${rel.map(archiveCard).join('')}</div>`:''}
    <div class="cta-band">
      <h3>${p.name}에 함께해 주세요</h3>
      <p>당신의 기부가 이 변화를 잇습니다.</p>
      <a class="btn" href="https://beautifulfund.org/joinbf/" target="_blank" rel="noopener">재단 기부페이지에서 기부하기 →</a>
    </div>
  </section>`;
}

  return `<section class="page on">
    <h1 class="ttl">공모·신청</h1>
    <p class="sub">공모 정보 안내 및 신청 · 결과 발표</p>
    <div class="tabs" id="t-apply">
      <button class="on" data-t="p1">공모안내</button>
      <button data-t="p2">신청하기</button>
      <button data-t="p3">결과발표</button>
    </div>
    <div class="tabpane on" data-tp="p1">
      <div class="grid two">${notices.map(n=>`
        <div class="card" style="cursor:default">
          <span class="tag">${n.field} · ${n.open?'접수 중':'마감'}</span>
          <h4>${n.title}</h4>
          <p class="muted">${n.period}</p>

    <div class="tabpane" data-tp="p2">

        <li>온라인 제출 및 접수 확인</li>

      </ol>
      <a class="btn" href="https://change.beautifulfund.org" target="_blank" rel="noopener">배분신청사이트에서 신청하기 →</a>
    </div>
    <div class="tabpane" data-tp="p3">
      <table class="tb"><thead><tr><th>발표</th><th>일자</th><th>선정</th></tr></thead>
      <tbody>${results.map(r=>`<tr><td>${r.title}</td><td>${r.date}</td><td>${r.n}</td></tr>`).join('')}</tbody></table>
    </div>
  </section>`;
}

let archFilter='전체';
function pageArchive(){
  const fields=['전체','교육','인권','환경','지역'];
  const list = archive.filter(a=>archFilter==='전체'||a.field===archFilter);
  return `<section class="page on">
    <h1 class="ttl">아카이브</h1>
    <p class="sub">지원단체·활동가의 사업후기 · 인터뷰 · 성과리포트</p>
    <div class="filters" id="af">${fields.map(f=>`<button class="${f===archFilter?'on':''}" onclick="setFilter('${f}')">${f}</button>`).join('')}</div>
    <div class="grid" id="archlist">${list.map(archiveCard).join('')}</div>
  </section>`;
}
function setFilter(f){ archFilter=f; render(); }

/* ---------- router ---------- */
const routes = { home:pageHome, brand:pageBrand, support:pageSupport, apply:pageApply, archive:pageArchive };
function render(){
  const h = location.hash.replace('#','') || 'home';
  const [key,arg] = h.split('/');
  let html;
  if(key==='project'){ html = pageProject(arg); }
  else { html = (routes[key]||pageHome)(); }
  M.innerHTML = html;
  document.querySelectorAll('#gnb a').forEach(a=>a.classList.toggle('active', a.dataset.p===key || (key==='project'&&a.dataset.p==='support')));
  bindTabs();
  window.scrollTo(0,0);
}
function go(p){ location.hash = p; }
function openProject(id){ location.hash = 'project/'+id; }
function bindTabs(){
  document.querySelectorAll('.tabs').forEach(t=>{
    t.querySelectorAll('button').forEach(b=>b.onclick=()=>{
      t.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      const pane=b.dataset.t;
      t.parentElement.querySelectorAll('.tabpane').forEach(tp=>tp.classList.toggle('on', tp.dataset.tp===pane));
    });
  });
}
document.querySelectorAll('#gnb a').forEach(a=>a.onclick=()=>go(a.dataset.p));
window.addEventListener('hashchange', render);
render();
</script>
